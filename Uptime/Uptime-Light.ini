[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Uptime-Light
Author=Prince-1652
Information=A Nothing OS style Uptime widget showing weekly uptime (Light version).
Version=1.0

[Variables]
@Include=#CURRENTPATH#UptimeData.inc
FormattedUptime=0h 0m
WidgetColor=F0F0F0
WidgetWidth=390
WidgetHeight=190
CornerRadius=30
BgColor=D0D0D0
FillColor=EA1537
FontColor=000000
FontFace=Ndot 57 Aligned

Past1=0.7
Past2=0.4
Past3=0.8
Past4=0.6
Past5=0.5
Past6=0.9
Past7=0.3

[Variables]
Color1=0,0,0,0
Color2=0,0,0,0
Color3=0,0,0,0
Color4=0,0,0,0
Color5=0,0,0,0
Color6=0,0,0,0
Color7=0,0,0,0

[MeasureDay]
Measure=Time
Format=%u
IfCondition=MeasureDay = 1
IfTrueAction=[!SetOptionGroup Days FontColor "#FontColor#"][!SetOption MeterDay1 FontColor "#FillColor#"][!SetVariable Color1 "#FillColor#"][!SetVariable UptimeText1 "[*MeasureUptimeString*]"][!SetVariable Color2 "0,0,0,0"][!SetVariable UptimeText2 ""][!SetVariable Color3 "0,0,0,0"][!SetVariable UptimeText3 ""][!SetVariable Color4 "0,0,0,0"][!SetVariable UptimeText4 ""][!SetVariable Color5 "0,0,0,0"][!SetVariable UptimeText5 ""][!SetVariable Color6 "0,0,0,0"][!SetVariable UptimeText6 ""][!SetVariable Color7 "0,0,0,0"][!SetVariable UptimeText7 ""]
IfCondition2=MeasureDay = 2
IfTrueAction2=[!SetOptionGroup Days FontColor "#FontColor#"][!SetOption MeterDay2 FontColor "#FillColor#"][!SetVariable Color1 "#FontColor#"][!SetVariable UptimeText1 "#Past1Uptime#"][!SetVariable Color2 "#FillColor#"][!SetVariable UptimeText2 "[*MeasureUptimeString*]"][!SetVariable Color3 "0,0,0,0"][!SetVariable UptimeText3 ""][!SetVariable Color4 "0,0,0,0"][!SetVariable UptimeText4 ""][!SetVariable Color5 "0,0,0,0"][!SetVariable UptimeText5 ""][!SetVariable Color6 "0,0,0,0"][!SetVariable UptimeText6 ""][!SetVariable Color7 "0,0,0,0"][!SetVariable UptimeText7 ""]
IfCondition3=MeasureDay = 3
IfTrueAction3=[!SetOptionGroup Days FontColor "#FontColor#"][!SetOption MeterDay3 FontColor "#FillColor#"][!SetVariable Color1 "#FontColor#"][!SetVariable UptimeText1 "#Past1Uptime#"][!SetVariable Color2 "#FontColor#"][!SetVariable UptimeText2 "#Past2Uptime#"][!SetVariable Color3 "#FillColor#"][!SetVariable UptimeText3 "[*MeasureUptimeString*]"][!SetVariable Color4 "0,0,0,0"][!SetVariable UptimeText4 ""][!SetVariable Color5 "0,0,0,0"][!SetVariable UptimeText5 ""][!SetVariable Color6 "0,0,0,0"][!SetVariable UptimeText6 ""][!SetVariable Color7 "0,0,0,0"][!SetVariable UptimeText7 ""]
IfCondition4=MeasureDay = 4
IfTrueAction4=[!SetOptionGroup Days FontColor "#FontColor#"][!SetOption MeterDay4 FontColor "#FillColor#"][!SetVariable Color1 "#FontColor#"][!SetVariable UptimeText1 "#Past1Uptime#"][!SetVariable Color2 "#FontColor#"][!SetVariable UptimeText2 "#Past2Uptime#"][!SetVariable Color3 "#FontColor#"][!SetVariable UptimeText3 "#Past3Uptime#"][!SetVariable Color4 "#FillColor#"][!SetVariable UptimeText4 "[*MeasureUptimeString*]"][!SetVariable Color5 "0,0,0,0"][!SetVariable UptimeText5 ""][!SetVariable Color6 "0,0,0,0"][!SetVariable UptimeText6 ""][!SetVariable Color7 "0,0,0,0"][!SetVariable UptimeText7 ""]
IfCondition5=MeasureDay = 5
IfTrueAction5=[!SetOptionGroup Days FontColor "#FontColor#"][!SetOption MeterDay5 FontColor "#FillColor#"][!SetVariable Color1 "#FontColor#"][!SetVariable UptimeText1 "#Past1Uptime#"][!SetVariable Color2 "#FontColor#"][!SetVariable UptimeText2 "#Past2Uptime#"][!SetVariable Color3 "#FontColor#"][!SetVariable UptimeText3 "#Past3Uptime#"][!SetVariable Color4 "#FontColor#"][!SetVariable UptimeText4 "#Past4Uptime#"][!SetVariable Color5 "#FillColor#"][!SetVariable UptimeText5 "[*MeasureUptimeString*]"][!SetVariable Color6 "0,0,0,0"][!SetVariable UptimeText6 ""][!SetVariable Color7 "0,0,0,0"][!SetVariable UptimeText7 ""]
IfCondition6=MeasureDay = 6
IfTrueAction6=[!SetOptionGroup Days FontColor "#FontColor#"][!SetOption MeterDay6 FontColor "#FillColor#"][!SetVariable Color1 "#FontColor#"][!SetVariable UptimeText1 "#Past1Uptime#"][!SetVariable Color2 "#FontColor#"][!SetVariable UptimeText2 "#Past2Uptime#"][!SetVariable Color3 "#FontColor#"][!SetVariable UptimeText3 "#Past3Uptime#"][!SetVariable Color4 "#FontColor#"][!SetVariable UptimeText4 "#Past4Uptime#"][!SetVariable Color5 "#FontColor#"][!SetVariable UptimeText5 "#Past5Uptime#"][!SetVariable Color6 "#FillColor#"][!SetVariable UptimeText6 "[*MeasureUptimeString*]"][!SetVariable Color7 "0,0,0,0"][!SetVariable UptimeText7 ""]
IfCondition7=MeasureDay = 7
IfTrueAction7=[!SetOptionGroup Days FontColor "#FontColor#"][!SetOption MeterDay7 FontColor "#FillColor#"][!SetVariable Color1 "#FontColor#"][!SetVariable UptimeText1 "#Past1Uptime#"][!SetVariable Color2 "#FontColor#"][!SetVariable UptimeText2 "#Past2Uptime#"][!SetVariable Color3 "#FontColor#"][!SetVariable UptimeText3 "#Past3Uptime#"][!SetVariable Color4 "#FontColor#"][!SetVariable UptimeText4 "#Past4Uptime#"][!SetVariable Color5 "#FontColor#"][!SetVariable UptimeText5 "#Past5Uptime#"][!SetVariable Color6 "#FontColor#"][!SetVariable UptimeText6 "#Past6Uptime#"][!SetVariable Color7 "#FillColor#"][!SetVariable UptimeText7 "[*MeasureUptimeString*]"]

[MeasureUptime]
Measure=Uptime

[MeasureUptimeTracker]
Measure=Script
ScriptFile=UptimeTracker.lua

[MeasureUptimePercent]
Measure=Calc
Formula=(MeasureUptimeTracker / 86400) > 1 ? 1 : (MeasureUptimeTracker / 86400)

[MeasureH1]
Measure=Calc
Formula=MeasureDay = 1 ? MeasureUptimePercent : (MeasureDay > 1 ? #Past1# : 0.0)

[MeasureH2]
Measure=Calc
Formula=MeasureDay = 2 ? MeasureUptimePercent : (MeasureDay > 2 ? #Past2# : 0.0)

[MeasureH3]
Measure=Calc
Formula=MeasureDay = 3 ? MeasureUptimePercent : (MeasureDay > 3 ? #Past3# : 0.0)

[MeasureH4]
Measure=Calc
Formula=MeasureDay = 4 ? MeasureUptimePercent : (MeasureDay > 4 ? #Past4# : 0.0)

[MeasureH5]
Measure=Calc
Formula=MeasureDay = 5 ? MeasureUptimePercent : (MeasureDay > 5 ? #Past5# : 0.0)

[MeasureH6]
Measure=Calc
Formula=MeasureDay = 6 ? MeasureUptimePercent : (MeasureDay > 6 ? #Past6# : 0.0)

[MeasureH7]
Measure=Calc
Formula=MeasureDay = 7 ? MeasureUptimePercent : (MeasureDay > 7 ? #Past7# : 0.0)

[MeasureUptimeString]
Measure=String
String=#FormattedUptime#
DynamicVariables=1

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterTitle]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=30
Y=20
Text=UPTIME
AntiAlias=1

[MeterUptimeValue]
Meter=String
MeasureName=MeasureUptimeString
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=360
Y=20
StringAlign=Right
AntiAlias=1

[MeterLine]
Meter=Shape
Shape=Line 30, 140, 360, 140 | StrokeWidth 2 | StrokeColor #BgColor#
AntiAlias=1

[MeterBar1]
Meter=Shape
Shape=Rectangle 37, (140 - ([MeasureH1] = 0 ? 0 : Max(4, 75 * [MeasureH1]))), 16, ([MeasureH1] = 0 ? 0 : Max(4, 75 * [MeasureH1])), 4 | StrokeWidth 0
Shape2=Rectangle 37, (140 - ([MeasureH1] = 0 ? 0 : 4)), 16, ([MeasureH1] = 0 ? 0 : 4) | StrokeWidth 0
Shape3=Combine Shape | Union Shape2 | FillColor #Color1#
DynamicVariables=1
AntiAlias=1

[MeterBar2]
Meter=Shape
Shape=Rectangle 87, (140 - ([MeasureH2] = 0 ? 0 : Max(4, 75 * [MeasureH2]))), 16, ([MeasureH2] = 0 ? 0 : Max(4, 75 * [MeasureH2])), 4 | StrokeWidth 0
Shape2=Rectangle 87, (140 - ([MeasureH2] = 0 ? 0 : 4)), 16, ([MeasureH2] = 0 ? 0 : 4) | StrokeWidth 0
Shape3=Combine Shape | Union Shape2 | FillColor #Color2#
DynamicVariables=1
AntiAlias=1

[MeterBar3]
Meter=Shape
Shape=Rectangle 137, (140 - ([MeasureH3] = 0 ? 0 : Max(4, 75 * [MeasureH3]))), 16, ([MeasureH3] = 0 ? 0 : Max(4, 75 * [MeasureH3])), 4 | StrokeWidth 0
Shape2=Rectangle 137, (140 - ([MeasureH3] = 0 ? 0 : 4)), 16, ([MeasureH3] = 0 ? 0 : 4) | StrokeWidth 0
Shape3=Combine Shape | Union Shape2 | FillColor #Color3#
DynamicVariables=1
AntiAlias=1

[MeterBar4]
Meter=Shape
Shape=Rectangle 187, (140 - ([MeasureH4] = 0 ? 0 : Max(4, 75 * [MeasureH4]))), 16, ([MeasureH4] = 0 ? 0 : Max(4, 75 * [MeasureH4])), 4 | StrokeWidth 0
Shape2=Rectangle 187, (140 - ([MeasureH4] = 0 ? 0 : 4)), 16, ([MeasureH4] = 0 ? 0 : 4) | StrokeWidth 0
Shape3=Combine Shape | Union Shape2 | FillColor #Color4#
DynamicVariables=1
AntiAlias=1

[MeterBar5]
Meter=Shape
Shape=Rectangle 237, (140 - ([MeasureH5] = 0 ? 0 : Max(4, 75 * [MeasureH5]))), 16, ([MeasureH5] = 0 ? 0 : Max(4, 75 * [MeasureH5])), 4 | StrokeWidth 0
Shape2=Rectangle 237, (140 - ([MeasureH5] = 0 ? 0 : 4)), 16, ([MeasureH5] = 0 ? 0 : 4) | StrokeWidth 0
Shape3=Combine Shape | Union Shape2 | FillColor #Color5#
DynamicVariables=1
AntiAlias=1

[MeterBar6]
Meter=Shape
Shape=Rectangle 287, (140 - ([MeasureH6] = 0 ? 0 : Max(4, 75 * [MeasureH6]))), 16, ([MeasureH6] = 0 ? 0 : Max(4, 75 * [MeasureH6])), 4 | StrokeWidth 0
Shape2=Rectangle 287, (140 - ([MeasureH6] = 0 ? 0 : 4)), 16, ([MeasureH6] = 0 ? 0 : 4) | StrokeWidth 0
Shape3=Combine Shape | Union Shape2 | FillColor #Color6#
DynamicVariables=1
AntiAlias=1

[MeterBar7]
Meter=Shape
Shape=Rectangle 337, (140 - ([MeasureH7] = 0 ? 0 : Max(4, 75 * [MeasureH7]))), 16, ([MeasureH7] = 0 ? 0 : Max(4, 75 * [MeasureH7])), 4 | StrokeWidth 0
Shape2=Rectangle 337, (140 - ([MeasureH7] = 0 ? 0 : 4)), 16, ([MeasureH7] = 0 ? 0 : 4) | StrokeWidth 0
Shape3=Combine Shape | Union Shape2 | FillColor #Color7#
DynamicVariables=1
AntiAlias=1

[MeterDay1]
Meter=String
Group=Days
FontFace=#FontFace#
FontSize=11
FontColor=#FontColor#
X=45
Y=155
StringAlign=Center
Text=MON
AntiAlias=1

[MeterDay2]
