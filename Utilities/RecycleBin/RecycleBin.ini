[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Self RecycleBin
Author=Prince-1652
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureBinItems]
Measure=Plugin
Plugin=RecycleManager
RecycleType=Count

[MeasureBinSize]
Measure=Plugin
Plugin=RecycleManager
RecycleType=Size

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterBinText]
Meter=String
MeasureName=MeasureBinItems
FontFace=#FontFace#
FontSize=36
FontColor=#FontColor#
X=95
Y=30
StringAlign=Center
AntiAlias=1
Text=%1

[MeterBinLabel]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=95
Y=85
StringAlign=Center
AntiAlias=1
Text=TRASH

[MeterBinSize]
Meter=String
MeasureName=MeasureBinSize
FontFace=#FontFace#
FontSize=14
FontColor=#FillColor#
X=95
Y=135
StringAlign=Center
AntiAlias=1
AutoScale=1
Text=%1B
