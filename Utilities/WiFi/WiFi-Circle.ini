[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=WiFi Utility
 Circle
Author=Prince-1652
Information=Nothing OS style WiFi status widget.
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=95
WidgetHeight=95
CornerRadius=47.5
FontColor=FFFFFF
RedColor=EA1537
FontFace=Ndot 57 Aligned
IconColor=FFFFFF

[MeasureWiFi]
Measure=Plugin
Plugin=WiFiStatus
WiFiInfoType=Quality
IfCondition=MeasureWiFi > 0
IfTrueAction=[!SetVariable FontColor "#RedColor#"][!SetVariable IconColor "#RedColor#"][!UpdateMeter *][!Redraw]
IfFalseAction=[!SetVariable FontColor "FFFFFF"][!SetVariable IconColor "FFFFFF"][!UpdateMeter *][!Redraw]

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterWiFiIcon]
Meter=Image
ImageName=#@#Images\wifi-high-bold-white.png
X=28.5
Y=28.5
W=38
H=38
ImageTint=#IconColor#
DynamicVariables=1
AntiAlias=1



