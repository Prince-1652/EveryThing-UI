[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Airplane Utility
Author=Prince-1652
Information=Nothing OS style Airplane Mode status widget.
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=95
CornerRadius=47.5
FontColor=FFFFFF
RedColor=EA1537
FontFace=Ndot 57 Aligned
IconColor=FFFFFF

[MeasureAir]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-Command "$r=Get-ItemProperty 'HKLM:\System\CurrentControlSet\Control\RadioManagement\SystemRadioState' -ErrorAction SilentlyContinue; if ($r -and $r.SystemRadioState -eq 1) {Write-Host 1} else {Write-Host 0}"
State=Hide
OutputType=ANSI
UpdateDivider=5

[MeasureAirParser]
Measure=String
String=[MeasureAir]
DynamicVariables=1
IfCondition=MeasureAirParser = 1
IfTrueAction=[!SetVariable FontColor "#RedColor#"][!SetVariable IconColor "#RedColor#"][!UpdateMeter *][!Redraw]
IfFalseAction=[!SetVariable FontColor "FFFFFF"][!SetVariable IconColor "FFFFFF"][!UpdateMeter *][!Redraw]

[MeasureTrigger]
Measure=Calc
Formula=(MeasureTrigger % 5) + 1
IfCondition=MeasureTrigger = 1
IfTrueAction=[!CommandMeasure MeasureAir "Run"]

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1
LeftMouseUpAction=["ms-settings:network-airplanemode"]

[MeterAirIcon]
Meter=Image
ImageName=#@#Images\airplane-fill-white.png
X=28.5
Y=28.5
W=38
H=38
ImageTint=#IconColor#
DynamicVariables=1
AntiAlias=1

[MeterText]
Meter=String
FontFace=#FontFace#
FontSize=14
FontColor=#FontColor#
X=165
Y=50
StringAlign=RightCenter
Text=AIRPLANE
DynamicVariables=1
AntiAlias=1

