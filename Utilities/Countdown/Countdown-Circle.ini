[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Countdown Circle
Author=Prince-1652
Information=Nothing OS style countdown widget showing time remaining until midnight (circle shape).
Version=1.0

[Variables]
WidgetColor=1A1D1C
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureHour]
Measure=Time
Format=%H

[MeasureMinute]
Measure=Time
Format=%M

[MeasureSecond]
Measure=Time
Format=%S

[MeasureHoursLeft]
Measure=Calc
Formula=23 - MeasureHour
DynamicVariables=1

[MeasureMinutesLeft]
Measure=Calc
Formula=59 - MeasureMinute
DynamicVariables=1

[MeasureDayProgress]
Measure=Calc
Formula=((MeasureHour * 3600) + (MeasureMinute * 60) + MeasureSecond) / 86400
MinValue=0
MaxValue=1
DynamicVariables=1

[MeterBackground]
Meter=Shape
Shape=Ellipse 95,95,95 | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterRingBg]
Meter=Roundline
X=0
Y=0
W=190
H=190
LineLength=95
LineStart=85
Solid=1
LineColor=#BgColor#
AntiAlias=1

[MeterRingFill]
Meter=Roundline
MeasureName=MeasureDayProgress
X=0
Y=0
W=190
H=190
LineLength=95
LineStart=85
Solid=1
LineColor=#FillColor#
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
AntiAlias=1

[MeterHoursLeft]
Meter=String
MeasureName=MeasureHoursLeft
MeasureName2=MeasureMinutesLeft
FontFace=#FontFace#
FontSize=22
FontColor=#FontColor#
X=95
Y=75
StringAlign=CenterCenter
AntiAlias=1
Text=%1h %2m

[MeterLabel]
Meter=String
FontFace=#FontFace#
FontSize=11
FontColor=#FillColor#
X=95
Y=115
StringAlign=Center
AntiAlias=1
Text=REMAINING
