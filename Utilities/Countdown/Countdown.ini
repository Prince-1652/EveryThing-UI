[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Countdown
Author=Prince-1652
Information=Nothing OS style countdown widget showing time remaining until midnight (square shape).
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureHour]
Measure=Time
Format=%H

[MeasureMinute]
Measure=Time
Format=%M

[MeasureSecond]
Measure=Time
Format=%S

[MeasureHoursLeft]
Measure=Calc
Formula=23 - MeasureHour
DynamicVariables=1

[MeasureMinutesLeft]
Measure=Calc
Formula=59 - MeasureMinute
DynamicVariables=1

[MeasureSecondsLeft]
Measure=Calc
Formula=59 - MeasureSecond
DynamicVariables=1

[MeasureDayProgress]
Measure=Calc
Formula=((MeasureHour * 3600) + (MeasureMinute * 60) + MeasureSecond) / 86400
MinValue=0
MaxValue=1
DynamicVariables=1

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterLabel]
Meter=String
FontFace=#FontFace#
FontSize=13
FontColor=#FillColor#
X=95
Y=20
StringAlign=Center
AntiAlias=1
Text=UNTIL MIDNIGHT

[MeterHoursLeft]
Meter=String
MeasureName=MeasureHoursLeft
FontFace=#FontFace#
FontSize=40
FontColor=#FontColor#
X=95
Y=55
StringAlign=Center
AntiAlias=1
Text=%1h

[MeterMinutesLeft]
Meter=String
MeasureName=MeasureMinutesLeft
MeasureName2=MeasureSecondsLeft
FontFace=#FontFace#
FontSize=18
FontColor=#FontColor#
X=95
Y=105
StringAlign=Center
AntiAlias=1
Text=%1m %2s

[MeterBarContainer]
Meter=Shape
Shape=Rectangle 20, 140, 150, 30, 15 | FillColor 255,255,255,255 | StrokeWidth 0
AntiAlias=1

[MeterBarBg]
Meter=Shape
Shape=Rectangle 20, 140, 150, 30 | FillColor #BgColor# | StrokeWidth 0
Container=MeterBarContainer
AntiAlias=1

[MeterBarFill]
Meter=Shape
Shape=Rectangle 20, 140, (150 * [MeasureDayProgress]), 30 | FillColor #FillColor# | StrokeWidth 0
DynamicVariables=1
Container=MeterBarContainer
AntiAlias=1
