[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Bluetooth Light Utility
 Circle
Author=Prince-1652
Information=Nothing OS style Bluetooth status widget.
Version=1.0

[Variables]
WidgetColor=F0F0F0
WidgetWidth=95
WidgetHeight=95
CornerRadius=47.5
FontColor=141414
RedColor=EA1537
FontFace=Ndot 57 Aligned
IconColor=141414

[MeasureBT]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-Command "if ((Get-Service bthserv -ErrorAction SilentlyContinue).Status -eq 'Running') {Write-Host 1} else {Write-Host 0}"
State=Hide
OutputType=ANSI
UpdateDivider=5

[MeasureBTParser]
Measure=String
String=[MeasureBT]
DynamicVariables=1
IfCondition=MeasureBTParser = 1
IfTrueAction=[!SetVariable FontColor "#RedColor#"][!SetVariable IconColor "#RedColor#"][!UpdateMeter *][!Redraw]
IfFalseAction=[!SetVariable FontColor "141414"][!SetVariable IconColor "141414"][!UpdateMeter *][!Redraw]

[MeasureTrigger]
Measure=Calc
Formula=(MeasureTrigger % 5) + 1
IfCondition=MeasureTrigger = 1
IfTrueAction=[!CommandMeasure MeasureBT "Run"]

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1
LeftMouseUpAction=["ms-settings:bluetooth"]

[MeterBTIcon]
Meter=Image
ImageName=#@#Images\bluetooth-bold-white.png
X=28.5
Y=28.5
W=38
H=38
ImageTint=#IconColor#
DynamicVariables=1
AntiAlias=1



