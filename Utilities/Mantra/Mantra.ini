[Rainmeter]
Update=10000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Mantra
Author=Antigravity
Information=Nothing OS style rotating mantra
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=390
WidgetHeight=95
CornerRadius=47.5
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureQuoteIndex]
Measure=Calc
Formula=(MeasureQuoteIndex % 5) + 1

[MeasureQuote]
Measure=String
String=[MeasureQuoteIndex]
DynamicVariables=1
Substitute="1":"STAY FOCUSED","2":"KEEP GOING","3":"YOU GOT THIS","4":"EMBRACE THE VOID","5":"NOTHING TO FEAR"

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterDot]
Meter=Shape
Shape=Ellipse 47.5,47.5,8 | FillColor #FillColor# | StrokeWidth 0
AntiAlias=1

[MeterQuote]
Meter=String
MeasureName=MeasureQuote
FontFace=#FontFace#
FontSize=18
FontColor=#FontColor#
X=80
Y=50
StringAlign=LeftCenter
AntiAlias=1
