[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Self CPU
Author=Prince-1652
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureCPU]
Measure=CPU

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterCPUText]
Meter=String
MeasureName=MeasureCPU
FontFace=#FontFace#
FontSize=32
FontColor=#FontColor#
X=95
Y=20
StringAlign=Center
AntiAlias=1
Text=%1%

[MeterCPULabel]
Meter=String
FontFace=#FontFace#
FontSize=13
FontColor=#FontColor#
X=95
Y=68
StringAlign=Center
AntiAlias=1
Text=CPU

[MeterCPUBarContainer]
Meter=Shape
Shape=Rectangle 20, 105, 150, 65, 15 | FillColor 255,255,255,255 | StrokeWidth 0
AntiAlias=1

[MeterCPUBarBg]
Meter=Shape
Shape=Rectangle 20, 105, 150, 65 | FillColor #BgColor# | StrokeWidth 0
Container=MeterCPUBarContainer
AntiAlias=1

[MeterCPUBarFill]
Meter=Shape
Shape=Rectangle 20, 105, (150 * [MeasureCPU] / 100), 65 | FillColor #FillColor# | StrokeWidth 0
DynamicVariables=1
Container=MeterCPUBarContainer
AntiAlias=1
