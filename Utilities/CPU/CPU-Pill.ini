[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Self CPU Pill
Author=Prince-1652
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=95
CornerRadius=47.5
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned
RedColor=#FillColor#

[MeasureCPU]
Measure=CPU

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterCPUPieBg]
Meter=Shape
Shape=Ellipse 47.5, 47.5, 32.5 | FillColor #BgColor# | StrokeWidth 0
AntiAlias=1

[MeterCPUPie]
Meter=Roundline
MeasureName=MeasureCPU
X=15
Y=15
W=65
H=65
LineLength=32.5
Solid=1
LineColor=#FillColor#
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
AntiAlias=1

[MeterCPUValueText]
Meter=String
MeasureName=MeasureCPU
FontFace=#FontFace#
FontSize=24
FontColor=#FontColor#
X=95
Y=52
StringAlign=LeftBottom
AntiAlias=1
Text=%1%

[MeterCPULabelText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=95
Y=57
StringAlign=LeftTop
AntiAlias=1
Text=CPU
