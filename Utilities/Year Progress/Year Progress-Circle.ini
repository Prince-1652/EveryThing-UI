[Rainmeter]
Update=10000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Year Progress Circle
Author=Prince-1652
Information=Nothing OS style year progress widget (circle shape).
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureDayOfYear]
Measure=Time
Format=%j

[MeasureYear]
Measure=Time
Format=%Y

[MeasureYearProgress]
Measure=Calc
Formula=MeasureDayOfYear / 365
MinValue=0
MaxValue=1
DynamicVariables=1

[MeasureYearPercent]
Measure=Calc
Formula=Round((MeasureDayOfYear / 365) * 100)
DynamicVariables=1

[MeterBackground]
Meter=Shape
Shape=Ellipse 95,95,95 | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterRingBg]
Meter=Roundline
X=0
Y=0
W=190
H=190
LineLength=95
LineStart=85
Solid=1
LineColor=#BgColor#
AntiAlias=1

[MeterRingFill]
Meter=Roundline
MeasureName=MeasureYearProgress
X=0
Y=0
W=190
H=190
LineLength=95
LineStart=85
Solid=1
LineColor=#FillColor#
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
AntiAlias=1

[MeterPercentText]
Meter=String
MeasureName=MeasureYearPercent
FontFace=#FontFace#
FontSize=28
FontColor=#FontColor#
X=95
Y=75
StringAlign=CenterCenter
AntiAlias=1
Text=%1%

[MeterDayCount]
Meter=String
MeasureName=MeasureDayOfYear
FontFace=#FontFace#
FontSize=10
FontColor=#FontColor#
X=95
Y=100
StringAlign=Center
AntiAlias=1
Text=DAY %1

[MeterYearLabel]
Meter=String
MeasureName=MeasureYear
FontFace=#FontFace#
FontSize=14
FontColor=#FillColor#
X=95
Y=125
StringAlign=Center
AntiAlias=1
Text=%1
