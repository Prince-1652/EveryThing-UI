[Rainmeter]
Update=10000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Year Progress
Author=Prince-1652
Information=Nothing OS style year progress widget showing percentage of year elapsed (square shape).
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureDayOfYear]
Measure=Time
Format=%j

[MeasureYear]
Measure=Time
Format=%Y

[MeasureYearProgress]
Measure=Calc
Formula=MeasureDayOfYear / 365
MinValue=0
MaxValue=1
DynamicVariables=1

[MeasureYearPercent]
Measure=Calc
Formula=Round((MeasureDayOfYear / 365) * 100)
DynamicVariables=1

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterRingBg]
Meter=Roundline
X=25
Y=15
W=140
H=140
LineLength=70
LineStart=58
Solid=1
LineColor=#BgColor#
AntiAlias=1

[MeterRingFill]
Meter=Roundline
MeasureName=MeasureYearProgress
X=25
Y=15
W=140
H=140
LineLength=70
LineStart=58
Solid=1
LineColor=#FillColor#
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
AntiAlias=1

[MeterPercentText]
Meter=String
MeasureName=MeasureYearPercent
FontFace=#FontFace#
FontSize=28
FontColor=#FontColor#
X=95
Y=80
StringAlign=CenterCenter
AntiAlias=1
Text=%1%

[MeterYearText]
Meter=String
MeasureName=MeasureYear
FontFace=#FontFace#
FontSize=10
FontColor=#FillColor#
X=95
Y=160
StringAlign=Center
AntiAlias=1
Text=%1

[MeterDayCount]
Meter=String
MeasureName=MeasureDayOfYear
FontFace=#FontFace#
FontSize=10
FontColor=#FontColor#
X=95
Y=100
StringAlign=Center
AntiAlias=1
Text=DAY %1
