[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Greeting Square
Author=Prince-1652
Information=Nothing OS style greeting widget with stacked layout (square shape).
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureHour24]
Measure=Time
Format=%H

[MeasureGreeting]
Measure=Calc
Formula=MeasureHour24
IfAboveValue=17
IfAboveAction=[!SetOption MeterGreeting Text "GOOD#CRLF#EVENING"]
IfBelowValue=12
IfBelowAction=[!SetOption MeterGreeting Text "GOOD#CRLF#MORNING"]
IfEqualValue=12
IfEqualAction=[!SetOption MeterGreeting Text "GOOD#CRLF#AFTERNOON"]
IfCondition=(MeasureHour24 >= 12) && (MeasureHour24 <= 17)
IfTrueAction=[!SetOption MeterGreeting Text "GOOD#CRLF#AFTERNOON"]
DynamicVariables=1

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterGreeting]
Meter=String
FontFace=#FontFace#
FontSize=20
FontColor=#FontColor#
X=95
Y=25
StringAlign=Center
AntiAlias=1
Text=GOOD#CRLF#MORNING
DynamicVariables=1

[MeterClockHour]
Meter=String
MeasureName=MeasureHour
FontFace=#FontFace#
FontSize=30
FontColor=#FillColor#
X=55
Y=120
StringAlign=Center
AntiAlias=1
Text=%1

[MeterClockColon]
Meter=String
FontFace=#FontFace#
FontSize=30
FontColor=#BgColor#
X=95
Y=120
StringAlign=Center
AntiAlias=1
Text=:

[MeterClockMinute]
Meter=String
MeasureName=MeasureMinute
FontFace=#FontFace#
FontSize=30
FontColor=#FillColor#
X=135
Y=120
StringAlign=Center
AntiAlias=1
Text=%1
