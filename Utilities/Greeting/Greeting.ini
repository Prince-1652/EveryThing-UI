[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Greeting
Author=Prince-1652
Information=Nothing OS style greeting widget that shows a time-based greeting with clock (wide shape).
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=390
WidgetHeight=95
CornerRadius=47.5
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureHour24]
Measure=Time
Format=%H

[MeasureGreeting]
Measure=Calc
Formula=MeasureHour24
IfAboveValue=17
IfAboveAction=[!SetOption MeterGreeting Text "GOOD EVENING"]
IfBelowValue=12
IfBelowAction=[!SetOption MeterGreeting Text "GOOD MORNING"]
IfEqualValue=12
IfEqualAction=[!SetOption MeterGreeting Text "GOOD AFTERNOON"]
IfCondition=(MeasureHour24 >= 12) && (MeasureHour24 <= 17)
IfTrueAction=[!SetOption MeterGreeting Text "GOOD AFTERNOON"]
DynamicVariables=1

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeasureAMPM]
Measure=Time
Format=%p

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterGreeting]
Meter=String
FontFace=#FontFace#
FontSize=18
FontColor=#FillColor#
X=30
Y=25
AntiAlias=1
Text=GOOD MORNING
DynamicVariables=1

[MeterClock]
Meter=String
MeasureName=MeasureHour
MeasureName2=MeasureMinute
MeasureName3=MeasureAMPM
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=30
Y=55
AntiAlias=1
Text=%1:%2 %3
StringCase=Upper

[MeterDot]
Meter=Shape
Shape=Ellipse 360, 47.5, 8 | FillColor #FillColor# | StrokeWidth 0
AntiAlias=1
