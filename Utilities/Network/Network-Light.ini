[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Self Network Light
Author=Prince-1652
Version=1.0

[Variables]
WidgetColor=FFFFFF
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=E0E0E0
FillColor=EA1537
FontColor=1A1D1C
FontFace=Ndot 57 Aligned

[MeasureNetIn]
Measure=NetIn

[MeasureNetOut]
Measure=NetOut

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterLabel]
Meter=String
FontFace=#FontFace#
FontSize=24
FontColor=#FontColor#
X=95
Y=20
StringAlign=Center
AntiAlias=1
Text=NETWORK

[MeterDL]
Meter=String
MeasureName=MeasureNetIn
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=95
Y=75
StringAlign=Center
AntiAlias=1
AutoScale=1
Text=DL: %1b

[MeterUL]
Meter=String
MeasureName=MeasureNetOut
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=95
Y=115
StringAlign=Center
AntiAlias=1
AutoScale=1
Text=UL: %1b

[MeterDot]
Meter=Shape
Shape=Ellipse 95, 160, 8 | FillColor #FillColor# | StrokeWidth 0
AntiAlias=1
