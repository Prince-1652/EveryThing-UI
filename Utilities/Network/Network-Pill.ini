[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Self Network Pill
Author=Prince-1652
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=95
CornerRadius=47.5
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned
RedColor=#FillColor#

[MeasureNetIn]
Measure=NetIn

[MeasureNetOut]
Measure=NetOut

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterNetLabel]
Meter=String
FontFace=#FontFace#
FontSize=20
FontColor=#RedColor#
X=47.5
Y=52
StringAlign=CenterCenter
AntiAlias=1
Text=NET

[MeterDL]
Meter=String
MeasureName=MeasureNetIn
FontFace=#FontFace#
FontSize=12
FontColor=#FontColor#
X=90
Y=45
StringAlign=LeftBottom
AntiAlias=1
AutoScale=1
Text=D: %1b

[MeterUL]
Meter=String
MeasureName=MeasureNetOut
FontFace=#FontFace#
FontSize=12
FontColor=#FontColor#
X=90
Y=55
StringAlign=LeftTop
AntiAlias=1
AutoScale=1
Text=U: %1b
