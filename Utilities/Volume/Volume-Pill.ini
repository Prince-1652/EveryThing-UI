[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Volume Pill
Author=Prince-1652
Information=Nothing OS style volume widget (pill shape).
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=95
CornerRadius=47.5
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureVolume]
Measure=Plugin
Plugin=Win7AudioPlugin
UpdateDivider=2

[MeasureVolumePercent]
Measure=Calc
Formula=MeasureVolume

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterVolPieBg]
Meter=Shape
Shape=Ellipse 47.5, 47.5, 32.5 | FillColor #BgColor# | StrokeWidth 0
AntiAlias=1

[MeterVolPie]
Meter=Roundline
MeasureName=MeasureVolume
X=15
Y=15
W=65
H=65
LineLength=32.5
Solid=1
LineColor=#FillColor#
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
AntiAlias=1

[MeterVolumeText]
Meter=String
MeasureName=MeasureVolumePercent
FontFace=#FontFace#
FontSize=20
FontColor=#FontColor#
X=95
Y=52
StringAlign=LeftBottom
AntiAlias=1
Text=%1%

[MeterLabel]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=#FillColor#
X=95
Y=57
StringAlign=LeftTop
AntiAlias=1
Text=VOL
