[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Volume
Author=Prince-1652
Information=Nothing OS style volume widget with ring visualization (square shape).
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeasureVolume]
Measure=Plugin
Plugin=Win7AudioPlugin
UpdateDivider=2

[MeasureVolumePercent]
Measure=Calc
Formula=MeasureVolume

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterRingBg]
Meter=Roundline
X=25
Y=15
W=140
H=140
LineLength=70
LineStart=58
Solid=1
LineColor=#BgColor#
AntiAlias=1

[MeterRingFill]
Meter=Roundline
MeasureName=MeasureVolume
X=25
Y=15
W=140
H=140
LineLength=70
LineStart=58
Solid=1
LineColor=#FillColor#
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
AntiAlias=1

[MeterVolumeText]
Meter=String
MeasureName=MeasureVolumePercent
FontFace=#FontFace#
FontSize=26
FontColor=#FontColor#
X=95
Y=90
StringAlign=CenterCenter
AntiAlias=1
Text=%1%

[MeterLabel]
Meter=String
FontFace=#FontFace#
FontSize=10
FontColor=#FontColor#
X=95
Y=160
StringAlign=Center
AntiAlias=1
Text=VOLUME
