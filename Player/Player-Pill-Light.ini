[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Player Pill Light
Author=Prince-1652
Information=Nothing OS style media player using SMTC (MediaPlayer.dll)
Version=1.0

[Variables]
WidgetColor=F0F0F0
WidgetWidth=390
WidgetHeight=95
CornerRadius=47.5
BgColor=D0D0D0
FillColor=EA1537
FontColor=000000
FontFace=Ndot 57 Aligned

; =========================================
; MEASURES (Using MediaPlayer.dll strictly)
; =========================================

[MeasurePlayer]
Measure=Plugin
Plugin=MediaPlayer
; The parent measure connects to the Windows SMTC service

[MeasureTitle]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Title
; Retrieves the Track Title or Video Name

[MeasureArtist]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Artist
; Retrieves the Artist or Channel Name

[MeasureCover]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Cover
; Retrieves the Cover Art / Thumbnail

[MeasureProgress]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Progress
; Retrieves the playback progress (0-100)

[MeasureState]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=State
; Retrieves the playback state (0=Stopped, 1=Playing, 2=Paused)

; =========================================
; METERS
; =========================================

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

; --- LEFT SIDE (Thumbnail) ---
[MeterCoverContainer]
Meter=Shape
Shape=Ellipse 50,47.5,38 | FillColor 255,255,255,255 | StrokeWidth 0
AntiAlias=1

[MeterCover]
Meter=Image
MeasureName=MeasureCover
X=15
Y=12.5
W=70
H=70
PreserveAspectRatio=2
Container=MeterCoverContainer
AntiAlias=1

; --- RIGHT SIDE (Info & Controls) ---
[MeterTitle]
Meter=String
MeasureName=MeasureTitle
FontFace=#FontFace#
FontSize=12
FontColor=#FontColor#
X=95
Y=20
W=120
H=20
ClipString=1
Text=%1
AntiAlias=1

[MeterArtist]
Meter=String
MeasureName=MeasureArtist
FontFace=#FontFace#
FontSize=10
FontColor=#FillColor#
X=95
Y=42
W=120
H=18
ClipString=1
Text=%1
AntiAlias=1

; --- CONTROLS ---
[MeterPrev]
Meter=Shape
Shape=Path PlayPath | FillColor #BgColor# | StrokeWidth 0 | Extend Bar
PlayPath=12,0 | LineTo 0,6 | LineTo 12,12 | ClosePath
Bar=Rectangle -3,0,3,12 | FillColor #BgColor# | StrokeWidth 0
X=255
Y=30
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Previous"]
AntiAlias=1

[MeterPlay]
Meter=Shape
Shape=Path PlayPath | FillColor #FontColor# | StrokeWidth 0
PlayPath=0,0 | LineTo 12,6 | LineTo 0,12 | ClosePath
X=300
Y=30
Hidden=([MeasureState]=1 ? 1 : 0)
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "PlayPause"]
AntiAlias=1

[MeterPause]
Meter=Shape
Shape=Rectangle 0,0,4,12 | FillColor #FontColor# | StrokeWidth 0
Shape2=Rectangle 8,0,4,12 | FillColor #FontColor# | StrokeWidth 0
X=300
Y=30
Hidden=([MeasureState]=1 ? 0 : 1)
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "PlayPause"]
AntiAlias=1

[MeterNext]
Meter=Shape
Shape=Path PlayPath | FillColor #BgColor# | StrokeWidth 0 | Extend Bar
PlayPath=0,0 | LineTo 12,6 | LineTo 0,12 | ClosePath
Bar=Rectangle 12,0,3,12 | FillColor #BgColor# | StrokeWidth 0
X=345
Y=30
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Next"]
AntiAlias=1

; --- PROGRESS BAR ---
[MeterProgressBarBg]
Meter=Shape
Shape=Rectangle 95,68,265,6,3 | FillColor #BgColor# | StrokeWidth 0
AntiAlias=1

[MeterProgressBarFill]
Meter=Shape
Shape=Rectangle 95,68,(265 * [MeasureProgress] / 100),6,3 | FillColor #FillColor# | StrokeWidth 0
DynamicVariables=1
AntiAlias=1
