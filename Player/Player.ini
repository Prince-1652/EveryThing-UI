[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Player
Author=Prince-1652
Information=Nothing OS style media player using SMTC (MediaPlayer.dll)
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=390
WidgetHeight=190
CornerRadius=30
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

; =========================================
; MEASURES (Using MediaPlayer.dll strictly)
; =========================================

[MeasurePlayer]
Measure=Plugin
Plugin=MediaPlayer
; The parent measure connects to the Windows SMTC service

[MeasureTitle]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Title
; Retrieves the Track Title or Video Name

[MeasureArtist]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Artist
; Retrieves the Artist or Channel Name

[MeasureCover]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Cover
; Retrieves the Cover Art / Thumbnail

[MeasureProgress]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=Progress
; Retrieves the playback progress (0-100)

[MeasureState]
Measure=Plugin
Plugin=MediaPlayer
PlayerName=[MeasurePlayer]
PlayerType=State
; Retrieves the playback state (0=Stopped, 1=Playing, 2=Paused)

; =========================================
; METERS
; =========================================

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

; --- LEFT SIDE (Thumbnail) ---
[MeterCoverContainer]
Meter=Shape
Shape=Rectangle 20,20,150,150,20 | FillColor 255,255,255,255 | StrokeWidth 0
AntiAlias=1

[MeterCover]
Meter=Image
MeasureName=MeasureCover
X=20
Y=20
W=150
H=150
PreserveAspectRatio=2
Container=MeterCoverContainer
AntiAlias=1

; --- RIGHT SIDE (Info & Controls) ---
[MeterTitle]
Meter=String
MeasureName=MeasureTitle
FontFace=#FontFace#
FontSize=16
FontColor=#FontColor#
X=195
Y=30
W=175
H=25
ClipString=1
Text=%1
AntiAlias=1

[MeterArtist]
Meter=String
MeasureName=MeasureArtist
FontFace=#FontFace#
FontSize=12
FontColor=#FillColor#
X=195
Y=65
W=175
H=20
ClipString=1
Text=%1
AntiAlias=1

; --- CONTROLS ---
[MeterPrev]
Meter=Shape
Shape=Path PlayPath | FillColor #BgColor# | StrokeWidth 0 | Extend Bar
PlayPath=16,0 | LineTo 0,8 | LineTo 16,16 | ClosePath
Bar=Rectangle -4,0,4,16 | FillColor #BgColor# | StrokeWidth 0
X=215
Y=105
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Previous"]
AntiAlias=1

[MeterPlay]
Meter=Shape
Shape=Path PlayPath | FillColor #FontColor# | StrokeWidth 0
PlayPath=0,0 | LineTo 16,8 | LineTo 0,16 | ClosePath
X=275
Y=105
Hidden=([MeasureState]=1 ? 1 : 0)
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "PlayPause"]
AntiAlias=1

[MeterPause]
Meter=Shape
Shape=Rectangle 0,0,6,16 | FillColor #FontColor# | StrokeWidth 0
Shape2=Rectangle 10,0,6,16 | FillColor #FontColor# | StrokeWidth 0
X=275
Y=105
Hidden=([MeasureState]=1 ? 0 : 1)
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "PlayPause"]
AntiAlias=1

[MeterNext]
Meter=Shape
Shape=Path PlayPath | FillColor #BgColor# | StrokeWidth 0 | Extend Bar
PlayPath=0,0 | LineTo 16,8 | LineTo 0,16 | ClosePath
Bar=Rectangle 16,0,4,16 | FillColor #BgColor# | StrokeWidth 0
X=335
Y=105
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Next"]
AntiAlias=1

; --- PROGRESS BAR ---
[MeterProgressBarBg]
Meter=Shape
Shape=Rectangle 195,150,175,8,4 | FillColor #BgColor# | StrokeWidth 0
AntiAlias=1

[MeterProgressBarFill]
Meter=Shape
Shape=Rectangle 195,150,(175 * [MeasureProgress] / 100),8,4 | FillColor #FillColor# | StrokeWidth 0
DynamicVariables=1
AntiAlias=1
