[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Battery Horizontal
Author=Prince-1652
Information=Nothing OS style horizontal pill battery widget.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=95
CornerRadius=47.5
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned
FontSize=20

[MeasureBatteryPercent]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Percent

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterRingBg]
Meter=Roundline
X=47.5
Y=47.5
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
LineLength=35
LineStart=28
Solid=1
LineColor=#BgColor#
AntiAlias=1

[MeterRingFill]
Meter=Roundline
MeasureName=MeasureBatteryPercent
X=47.5
Y=47.5
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
LineLength=35
LineStart=28
Solid=1
LineColor=#FillColor#
AntiAlias=1

[MeterBatteryThunder]
Meter=Shape
Shape=Ellipse 51.5,31.5,1.5 | FillColor #FontColor# | StrokeWidth 0
Shape2=Ellipse 47.5,35.5,1.5 | FillColor #FontColor# | StrokeWidth 0
