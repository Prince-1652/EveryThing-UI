MeasureName=MeasureBatteryPercent
X=0
Y=0
W=190
H=190
LineLength=95
LineStart=85
Solid=1
LineColor=#FillColor#
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
AntiAlias=1

