[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Battery 1 Light
Author=Prince-1652
Information=Nothing OS style battery circle widget - Light.
Version=1.0

[Variables]
WidgetColor=F0F0F0
WidgetWidth=190
WidgetHeight=190
BgColor=E0E0E0
FillColor=EA1537
FontColor=000000
FontFace=Ndot 57 Aligned

[MeasureBatteryPercent]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Percent

[MeterBackground]
Meter=Shape
Shape=Ellipse 95,95,95 | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterBatteryRingBg]
Meter=Roundline
X=0
Y=0
W=190
H=190
LineLength=95
LineStart=85
Solid=1
LineColor=#BgColor#
AntiAlias=1

[MeterBatteryRingFill]
