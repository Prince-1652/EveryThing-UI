[Metadata]
Name=Clock Light
Author=Prince-1652
Information=Nothing OS style clock widget with overlapping E1 and E2 fonts - Light.
Version=1.0

[Rainmeter]
Update=10000
AccurateText=1
DynamicWindowSize=1

[Variables]
Scale=1

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeasureTime]
Measure=Time
Format=%I:%M

[MeterTime]
MeasureName=MeasureTime
Meter=STRING
X=0
Y=0
FontSize=80
FontColor=e2201f
FontFace=E1
AntiAlias=1
DynamicVariables=1

[MeterTime2]
MeasureName=MeasureTime
Meter=STRING
X=0
Y=0
FontSize=80
FontColor=FFFFFF
FontFace=E2
AntiAlias=1
DynamicVariables=1
