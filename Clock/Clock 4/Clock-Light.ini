[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Clock Simple Light
Author=Prince-1652
Information=A simple clock with no background - Light.
Version=1.0

[Variables]
FontColor=FFFFFF
FontFace=LIBRARY 3 AM
FontSize=86
RedColor=EA1537
ColonX=300
CenterY=100
Spacing=30
ColonOffsetX=-8
ColonOffsetY=-6

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeterHourText]
Meter=String
MeasureName=MeasureHour
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
X=(#ColonX# - #Spacing#)
Y=#CenterY#
StringAlign=RightCenter
AntiAlias=1
Text=%1

[MeterColon]
Meter=String
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#RedColor#
X=(#ColonX# + #ColonOffsetX#)
Y=(#CenterY# + #ColonOffsetY#)
StringAlign=CenterCenter
AntiAlias=1
Text=:

[MeterMinuteText]
Meter=String
MeasureName=MeasureMinute
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
X=(#ColonX# + #Spacing#)
Y=#CenterY#
StringAlign=LeftCenter
AntiAlias=1
Text=%1
