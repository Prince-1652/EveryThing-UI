[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Clock Dualtone
Author=Prince-1652
Information=A dualtone clock with no background using the 8Digit Pin font.
Version=1.0

[Variables]
FontColor=1A1D1C
MinuteColor=FFFFFF
FontFace=8Digit Pin
FontSize=72
RedColor=EA1537
ColonX=200
CenterY=100
Spacing=20
ColonOffsetX=-8
ColonOffsetY=-25

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeterHourText]
Meter=String
MeasureName=MeasureHour
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
X=(#ColonX# - #Spacing#)
Y=#CenterY#
StringAlign=RightCenter
AntiAlias=1
Text=%1

[MeterColon]
Meter=String
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#RedColor#
X=(#ColonX# + #ColonOffsetX#)
Y=(#CenterY# + #ColonOffsetY#)
StringAlign=CenterCenter
AntiAlias=1
Text=:

[MeterMinuteText]
Meter=String
MeasureName=MeasureMinute
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#MinuteColor#
X=(#ColonX# + #Spacing#)
Y=#CenterY#
StringAlign=LeftCenter
AntiAlias=1
Text=%1
