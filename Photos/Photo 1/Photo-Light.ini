[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Photo Square Light
Author=Prince-1652
Information=Nothing OS style square photo widget with a solid grayish frame (Light version).
Version=1.0

[Variables]
WidgetColor=F0F0F0
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=D0D0D0
Padding=10
FontColor=000000

[MeasureImage]
Measure=Plugin
Plugin=QuotePlugin
PathName=#CURRENTPATH#
FileFilter=*.jpg;*.jpeg;*.png;*.bmp;*.gif
Subfolders=0
UpdateDivider=-1
IfMatch=^$
IfMatchAction=[!ShowMeter MeterEmptyText][!Redraw]
IfNotMatchAction=[!HideMeter MeterEmptyText][!Redraw]

[MeasureRunPS]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-STA -ExecutionPolicy Bypass -WindowStyle Hidden -File "#CURRENTPATH#ChoosePhoto.ps1" "#CURRENTCONFIG#"
State=Hide

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1
LeftMouseDoubleClickAction=[!CommandMeasure MeasureRunPS "Run"]

[MeterPhotoBackground]
Meter=Shape
Shape=Rectangle #Padding#,#Padding#,(#WidgetWidth# - #Padding# * 2),(#WidgetHeight# - #Padding# * 2),(#CornerRadius# - #Padding#) | StrokeWidth 0 | FillColor #BgColor#
AntiAlias=1

[MeterEmptyText]
Meter=String
FontFace=Ndot 57 Aligned
FontSize=11
FontColor=#FontColor#
StringAlign=CenterCenter
X=(#WidgetWidth#/2)
Y=(#WidgetHeight#/2)
W=150
ClipString=2
Text=DOUBLE TAP TO#CRLF#SELECT IMAGE
AntiAlias=1
Hidden=1

[MeterPhotoContainer]
Meter=Shape
Shape=Rectangle #Padding#,#Padding#,(#WidgetWidth# - #Padding# * 2),(#WidgetHeight# - #Padding# * 2),(#CornerRadius# - #Padding#) | StrokeWidth 0 | FillColor 255,255,255,255
AntiAlias=1

[MeterPhoto]
Meter=Image
MeasureName=MeasureImage
X=#Padding#
Y=#Padding#
W=(#WidgetWidth# - #Padding# * 2)
H=(#WidgetHeight# - #Padding# * 2)
PreserveAspectRatio=2
Container=MeterPhotoContainer
AntiAlias=1
LeftMouseDoubleClickAction=[!CommandMeasure MeasureRunPS "Run"]
