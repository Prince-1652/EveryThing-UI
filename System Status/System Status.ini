[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=System Status
Author=Prince-1652
Information=A Nothing OS style system status widget.
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=390
WidgetHeight=190
CornerRadius=30
BgColor=404040
FillColor=EA1537
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

; --- MEASURES ---
[MeasureBatteryPercent]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Percent

[MeasureACLine]
Measure=Plugin
Plugin=PowerPlugin
PowerState=ACLine
Substitute="0":"DISCHARGING","1":"CHARGING"

[MeasureRAM]
Measure=PhysicalMemory

; Disk measures for C, D, E, F
[MeasureDiskTotalC]
Measure=FreeDiskSpace
Drive=C:
Total=1
UpdateDivider=10

[MeasureDiskFreeC]
Measure=FreeDiskSpace
Drive=C:
UpdateDivider=10

[MeasureDiskTotalD]
Measure=FreeDiskSpace
Drive=D:
Total=1
UpdateDivider=10

[MeasureDiskFreeD]
Measure=FreeDiskSpace
Drive=D:
UpdateDivider=10

[MeasureDiskTotalE]
Measure=FreeDiskSpace
Drive=E:
Total=1
UpdateDivider=10

[MeasureDiskFreeE]
Measure=FreeDiskSpace
Drive=E:
UpdateDivider=10

[MeasureDiskTotalF]
Measure=FreeDiskSpace
Drive=F:
Total=1
UpdateDivider=10

[MeasureDiskFreeF]
Measure=FreeDiskSpace
Drive=F:
UpdateDivider=10

[MeasureDiskTotal]
Measure=Calc
Formula=MeasureDiskTotalC + MeasureDiskTotalD + MeasureDiskTotalE + MeasureDiskTotalF

[MeasureDiskFree]
Measure=Calc
Formula=MeasureDiskFreeC + MeasureDiskFreeD + MeasureDiskFreeE + MeasureDiskFreeF

[MeasureDiskUsed]
Measure=Calc
Formula=MeasureDiskTotal - MeasureDiskFree

[MeasureDiskUsedGB]
Measure=Calc
Formula=MeasureDiskUsed / 1073741824

[MeasureDiskTotalGB]
Measure=Calc
Formula=MeasureDiskTotal / 1073741824

[MeasureDiskRatio]
Measure=Calc
Formula=MeasureDiskTotal > 0 ? (MeasureDiskUsed / MeasureDiskTotal) : 0

; --- METERS ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

; --- LEFT HALF (BATTERY) ---
[MeterBatteryText]
Meter=String
MeasureName=MeasureBatteryPercent
FontFace=#FontFace#
FontSize=32
FontColor=#FontColor#
X=16
Y=20
AntiAlias=1
Text=%1%

[MeterPowerStateText]
Meter=String
MeasureName=MeasureACLine
FontFace=#FontFace#
FontSize=13
FontColor=#FontColor#
X=20
Y=68
AntiAlias=1

[MeterBatteryBarContainer]
Meter=Shape
Shape=Rectangle 20, 105, 165, 65, 15 | FillColor 255,255,255,255 | StrokeWidth 0
AntiAlias=1

[MeterBatteryBarBg]
Meter=Shape
Shape=Rectangle 20, 105, 165, 65 | FillColor #BgColor# | StrokeWidth 0
Container=MeterBatteryBarContainer
AntiAlias=1

[MeterBatteryBarFill]
Meter=Shape
Shape=Rectangle 20, 105, (165 * [MeasureBatteryPercent] / 100), 65 | FillColor #FillColor# | StrokeWidth 0
DynamicVariables=1
Container=MeterBatteryBarContainer
AntiAlias=1

