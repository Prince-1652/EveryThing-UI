[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=Calendar
Author=Prince-1652
Information=A minimalist Nothing OS style calendar widget.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
PastColor=FFFFFF
CurrentColor=#FillColor#
FutureColor=404040
BgColor=404040
DisplayType=Dot

[MeasureMonth]
Measure=Time
Format=%B

[MeasureScript]
Measure=Script
ScriptFile=CalendarLogic.lua

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterMonthText]
Meter=String
MeasureName=MeasureMonth
FontFace=Ndot 57 Aligned
FontSize=18
FontColor=FFFFFF
X=20
Y=20
AntiAlias=1
StringCase=Upper

[MeterDay1]
Meter=Shape
AntiAlias=1

