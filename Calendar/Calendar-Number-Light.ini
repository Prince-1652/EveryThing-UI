[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=Calendar Number Light
Author=Prince-1652
Information=A minimalist Nothing OS style calendar widget.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=F0F0F0
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
PastColor=000000
CurrentColor=#FillColor#
FutureColor=A0A0A0
BgColor=D0D0D0
DisplayType=Number

[MeasureMonth]
Measure=Time
Format=%B

[MeasureScript]
Measure=Script
ScriptFile=CalendarLogic.lua

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#

[MeterMonthText]
Meter=String
MeasureName=MeasureMonth
FontFace=Ndot 57 Aligned
FontSize=18
FontColor=000000
X=20
Y=20
AntiAlias=1
StringCase=Upper

[MeterDayBg]
Meter=Shape
AntiAlias=1

[MeterDayText1]
