[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Clock Digital Square
Author=Prince-1652
Information=Nothing OS style digital clock widget with day (square shape).
Version=1.0

[Variables]
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
FontColor=FFFFFF
FontFace=Ndot 57 Aligned
ClockFontSize=44
DateFontSize=34
DayFontSize=16
MonthFontSize=12
RedColor=EA1537

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeasureDate]
Measure=Time
Format=%d

[MeasureMonth]
Measure=Time
Format=%B

[MeasureDay]
Measure=Time
Format=%A

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterHourText]
Meter=String
MeasureName=MeasureHour
FontFace=#FontFace#
FontSize=#ClockFontSize#
FontColor=#FontColor#
X=56
Y=54.5
StringAlign=CenterCenter
AntiAlias=1
Text=%1

[MeterMinuteText]
Meter=String
MeasureName=MeasureMinute
FontFace=#FontFace#
FontSize=#ClockFontSize#
FontColor=#FontColor#
X=134
Y=54.5
StringAlign=CenterCenter
AntiAlias=1
Text=%1

[MeterColon]
Meter=String
FontFace=#FontFace#
FontSize=#ClockFontSize#
FontColor=#RedColor#
X=95
Y=52
StringAlign=CenterCenter
AntiAlias=1
Text=:

[MeterDateText]
Meter=String
MeasureName=MeasureDate
FontFace=#FontFace#
FontSize=#DateFontSize#
FontColor=#FontColor#
X=20
Y=150
StringAlign=LeftBottom
AntiAlias=1
Text=%1

[MeterMonthText]
Meter=String
MeasureName=MeasureMonth
FontFace=#FontFace#
FontSize=#MonthFontSize#
FontColor=#RedColor#
X=8R
Y=-10r
StringAlign=LeftBottom
AntiAlias=1
StringCase=Upper
Text=%1

[MeterDayText]
Meter=String
MeasureName=MeasureDay
FontFace=#FontFace#
FontSize=#DayFontSize#
FontColor=#FontColor#
X=20
Y=170
StringAlign=LeftBottom
AntiAlias=1
StringCase=Upper
Text=%1
