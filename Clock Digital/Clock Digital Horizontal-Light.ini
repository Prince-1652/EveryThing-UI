[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Clock Digital Horizontal-Light
Author=Prince-1652
Information=Nothing OS style digital clock widget (horizontal pill shape) - Light.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=F0F0F0
WidgetWidth=190
WidgetHeight=95
CornerRadius=47.5
FontColor=000000
FontFace=Ndot 57 Aligned
FontSize=38
RedColor=#FillColor#

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterHourText]
Meter=String
MeasureName=MeasureHour
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
X=60
Y=54.5
StringAlign=CenterCenter
AntiAlias=1
Text=%1

[MeterMinuteText]
Meter=String
MeasureName=MeasureMinute
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
X=130
Y=54.5
StringAlign=CenterCenter
AntiAlias=1
Text=%1

[MeterColon]
Meter=String
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#RedColor#
X=95
Y=52
StringAlign=CenterCenter
AntiAlias=1
Text=:
