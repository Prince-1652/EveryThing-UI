[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Clock Digital
Author=Prince-1652
Information=Nothing OS style digital clock widget (pill shape).
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=95
WidgetHeight=190
CornerRadius=47.5
FontColor=FFFFFF
FontFace=Ndot 57 Aligned
FontSize=38

[MeasureHour]
Measure=Time
Format=%I

[MeasureMinute]
Measure=Time
Format=%M

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterHourText]
Meter=String
MeasureName=MeasureHour
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
X=47.5
Y=77
StringAlign=CenterCenter
AntiAlias=1
Text=%1

[MeterMinuteText]
Meter=String
MeasureName=MeasureMinute
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
X=47.5
Y=129
StringAlign=CenterCenter
AntiAlias=1
Text=%1
