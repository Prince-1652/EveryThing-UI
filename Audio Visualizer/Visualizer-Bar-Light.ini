[Rainmeter]
Update=40
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Visualizer Bar Wide Light
Author=Prince-1652
Information=Nothing OS style audio visualizer.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=F0F0F0
WidgetWidth=390
WidgetHeight=95
CornerRadius=47.5
BgColor=D0D0D0
FontColor=000000
FontFace=Ndot 57 Aligned

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeasureAudio]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=1024
FFTAttack=50
FFTDecay=150
Bands=25

[MeasureBand0]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Type=Band
BandIdx=0

[MeterBand0]
Meter=Shape
Shape=Rectangle 47, (75 - (Max(8, [MeasureBand0]*55))), 8, (Max(8, [MeasureBand0]*55)), 4 | FillColor #FillColor# | StrokeWidth 0
DynamicVariables=1
AntiAlias=1

