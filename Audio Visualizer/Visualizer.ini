[Rainmeter]
Update=40
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Visualizer Circle
Author=Prince-1652
Information=Nothing OS style audio visualizer.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
WidgetWidth=190
WidgetHeight=190
CornerRadius=30
BgColor=404040
FontColor=FFFFFF
FontFace=Ndot 57 Aligned

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeasureAudio]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=1024
FFTAttack=50
FFTDecay=150
Bands=20

[MeasureBand0]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Type=Band
BandIdx=0

[MeterBand0]
Meter=Roundline
MeasureName=MeasureBand0
X=0
Y=0
W=190
H=190
StartAngle=(Rad(-90))
RotationAngle=(Rad(10))
LineStart=50
LineLength=85
Solid=1
LineColor=#FillColor#
AntiAlias=1

