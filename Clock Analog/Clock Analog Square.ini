[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=Clock Analog Square
Author=Prince-1652
Information=Nothing OS style analog clock widget.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=1A1D1C
CornerRadius=30
GrayColor=404040
WhiteColor=FFFFFF
RedColor=#FillColor#

[MeasureTime]
Measure=Time

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,190,190,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[Meter12Dot]
Meter=Shape
Shape=Ellipse 95, 20, 5 | StrokeWidth 0 | FillColor #RedColor#
AntiAlias=1

[MeterHourHand]
Meter=Roundline
MeasureName=MeasureTime
X=0
Y=0
W=190
H=190
LineWidth=12
LineLength=55
LineStart=-8
LineColor=#WhiteColor#
Solid=0
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
ValueRemainder=43200
AntiAlias=1

[MeterMinuteHand]
Meter=Roundline
MeasureName=MeasureTime
X=0
Y=0
W=190
H=190
LineWidth=6
LineLength=70
LineStart=-8
LineColor=#GrayColor#
Solid=0
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
ValueRemainder=3600
AntiAlias=1
