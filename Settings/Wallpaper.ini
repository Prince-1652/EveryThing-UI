[Rainmeter]
Update=-1
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Settings - Wallpaper
Author=Prince-1652
Information=Wallpaper selector.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
Width=800
Height=450
CornerRadius=20
BgColor=1A1D1C
PanelColor=111312
TextColor=FFFFFF
TextColorDim=AAAAAA
FontFace=Ndot 57 Aligned
FontBody=Segoe UI
AccentHover=333333

; --- BACKGROUND & SIDEBAR ---
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height#,#CornerRadius# | StrokeWidth 0 | FillColor #BgColor#

[MeterSidebar]
Meter=Shape
Shape=Rectangle 0,0,240,#Height#,#CornerRadius# | StrokeWidth 0 | FillColor #PanelColor#
Shape2=Rectangle 220,0,20,#Height# | StrokeWidth 0 | FillColor #PanelColor#
Shape3=Combine Shape | Union Shape2

[MeterTitle]
Meter=String
FontFace=#FontFace#
FontSize=22
FontColor=#TextColor#
X=35
Y=35
Text=SETTINGS
AntiAlias=1

; --- TAB NAVIGATION ---
[MeterTabAboutBg]
Meter=Shape
Shape=Rectangle 0,110,240,50 | StrokeWidth 0 | FillColor 0,0,0,1
MouseOverAction=[!SetOption MeterTabAboutBg Shape "Rectangle 0,110,240,50 | StrokeWidth 0 | FillColor #AccentHover#"][!UpdateMeter MeterTabAboutBg][!Redraw]
MouseLeaveAction=[!SetOption MeterTabAboutBg Shape "Rectangle 0,110,240,50 | StrokeWidth 0 | FillColor 0,0,0,1"][!UpdateMeter MeterTabAboutBg][!Redraw]
LeftMouseUpAction=[!ActivateConfig "EveryThing-UI\Settings" "About.ini"]

[MeterTabAboutText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=150,150,150
X=45
Y=122
Text=ABOUT
AntiAlias=1

[MeterTabAccentBg]
Meter=Shape
Shape=Rectangle 0,160,240,50 | StrokeWidth 0 | FillColor 0,0,0,1
MouseOverAction=[!SetOption MeterTabAccentBg Shape "Rectangle 0,160,240,50 | StrokeWidth 0 | FillColor #AccentHover#"][!UpdateMeter MeterTabAccentBg][!Redraw]
MouseLeaveAction=[!SetOption MeterTabAccentBg Shape "Rectangle 0,160,240,50 | StrokeWidth 0 | FillColor 0,0,0,1"][!UpdateMeter MeterTabAccentBg][!Redraw]
LeftMouseUpAction=[!ActivateConfig "EveryThing-UI\Settings" "Accent.ini"]

[MeterTabAccentText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=150,150,150
X=45
Y=172
Text=ACCENT
AntiAlias=1

[MeterTabWallpaperBg]
Meter=Shape
Shape=Rectangle 0,210,240,50 | StrokeWidth 0 | FillColor 0,0,0,1

[MeterTabWallpaperText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=255,255,255
X=45
Y=222
Text=WALLPAPER
AntiAlias=1

[MeterTabWallpaperIndicator]
Meter=Shape
Shape=Rectangle 0,215,6,40 | StrokeWidth 0 | FillColor #FillColor#

[MeterClose]
Meter=String
FontFace=#FontBody#
FontSize=18
FontColor=#TextColorDim#
X=(#Width#-30)
Y=30
StringAlign=Right
Text=X
AntiAlias=1
LeftMouseUpAction=[!DeactivateConfig]
MouseOverAction=[!SetOption MeterClose FontColor FFFFFF][!UpdateMeter MeterClose][!Redraw]
MouseLeaveAction=[!SetOption MeterClose FontColor #TextColorDim#][!UpdateMeter MeterClose][!Redraw]

; --- WALLPAPER TAB CONTENT ---
[MeterWallpaperHeading]
Meter=String
FontFace=#FontFace#
FontSize=32
FontColor=#TextColor#
X=290
Y=45
Text=WALLPAPER
AntiAlias=1

[MeterWallpaperSub]
Meter=String
FontFace=#FontBody#
FontSize=14
FontColor=#TextColorDim#
X=290
Y=95
Text=Select a wallpaper to apply it to your desktop.
W=450
ClipString=2
AntiAlias=1

; Wallpapers Row 1
[MeterWallpaper1]
Meter=Image
ImageName=#@#Wallpaper\1.png
X=270
Y=140
W=150
H=85
PreserveAspectRatio=2
LeftMouseUpAction=[!SetWallpaper "#@#Wallpaper\1.png" Fit]
MouseOverAction=[!SetOption MeterWallpaper1Bg Shape "Rectangle 268,138,154,89,8 | FillColor 0,0,0,0 | StrokeWidth 2 | StrokeColor #FillColor#"][!UpdateMeter MeterWallpaper1Bg][!Redraw]
MouseLeaveAction=[!SetOption MeterWallpaper1Bg Shape "Rectangle 268,138,154,89,8 | FillColor 0,0,0,0 | StrokeWidth 0"][!UpdateMeter MeterWallpaper1Bg][!Redraw]

[MeterWallpaper1Bg]
Meter=Shape
Shape=Rectangle 268,138,154,89,8 | FillColor 0,0,0,0 | StrokeWidth 0

