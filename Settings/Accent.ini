[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Settings - Accent
Author=Prince-1652
Information=Accent color settings.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
Width=800
Height=450
CornerRadius=20
BgColor=1A1D1C
PanelColor=111312
TextColor=FFFFFF
TextColorDim=AAAAAA
FontFace=Ndot 57 Aligned
FontBody=Segoe UI
AccentHover=333333

; --- ACTIVE COLOR RING LOGIC ---
[MeasureIsRed]
Measure=String
String=#FillColor#
IfMatch=(?i)EA1537
IfMatchAction=[!SetOption MeterColorRedRing Shape "Ellipse 310, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 3 | StrokeColor FFFFFF"]
IfNotMatchAction=[!SetOption MeterColorRedRing Shape "Ellipse 310, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0"]

[MeasureIsBlue]
Measure=String
String=#FillColor#
IfMatch=(?i)007AFF
IfMatchAction=[!SetOption MeterColorBlueRing Shape "Ellipse 390, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 3 | StrokeColor FFFFFF"]
IfNotMatchAction=[!SetOption MeterColorBlueRing Shape "Ellipse 390, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0"]

[MeasureIsGreen]
Measure=String
String=#FillColor#
IfMatch=(?i)34C759
IfMatchAction=[!SetOption MeterColorGreenRing Shape "Ellipse 470, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 3 | StrokeColor FFFFFF"]
IfNotMatchAction=[!SetOption MeterColorGreenRing Shape "Ellipse 470, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0"]

[MeasureIsOrange]
Measure=String
String=#FillColor#
IfMatch=(?i)FF9500
IfMatchAction=[!SetOption MeterColorOrangeRing Shape "Ellipse 550, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 3 | StrokeColor FFFFFF"]
IfNotMatchAction=[!SetOption MeterColorOrangeRing Shape "Ellipse 550, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0"]

[MeasureIsPurple]
Measure=String
String=#FillColor#
IfMatch=(?i)AF52DE
IfMatchAction=[!SetOption MeterColorPurpleRing Shape "Ellipse 630, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 3 | StrokeColor FFFFFF"]
IfNotMatchAction=[!SetOption MeterColorPurpleRing Shape "Ellipse 630, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0"]

; --- BACKGROUND & SIDEBAR ---
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height#,#CornerRadius# | StrokeWidth 0 | FillColor #BgColor#

[MeterSidebar]
Meter=Shape
Shape=Rectangle 0,0,240,#Height#,#CornerRadius# | StrokeWidth 0 | FillColor #PanelColor#
Shape2=Rectangle 220,0,20,#Height# | StrokeWidth 0 | FillColor #PanelColor#
Shape3=Combine Shape | Union Shape2

[MeterTitle]
Meter=String
FontFace=#FontFace#
FontSize=22
FontColor=#TextColor#
X=35
Y=35
Text=SETTINGS
AntiAlias=1

; --- TAB NAVIGATION ---
[MeterTabAboutBg]
Meter=Shape
Shape=Rectangle 0,110,240,50 | StrokeWidth 0 | FillColor 0,0,0,1
MouseOverAction=[!SetOption MeterTabAboutBg Shape "Rectangle 0,110,240,50 | StrokeWidth 0 | FillColor #AccentHover#"][!UpdateMeter MeterTabAboutBg][!Redraw]
MouseLeaveAction=[!SetOption MeterTabAboutBg Shape "Rectangle 0,110,240,50 | StrokeWidth 0 | FillColor 0,0,0,1"][!UpdateMeter MeterTabAboutBg][!Redraw]
LeftMouseUpAction=[!ActivateConfig "EveryThing-UI\Settings" "About.ini"]

[MeterTabAboutText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=150,150,150
X=45
Y=122
Text=ABOUT
AntiAlias=1

[MeterTabAccentBg]
Meter=Shape
Shape=Rectangle 0,160,240,50 | StrokeWidth 0 | FillColor 0,0,0,1

[MeterTabAccentText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=255,255,255
X=45
Y=172
Text=ACCENT
AntiAlias=1

[MeterTabAccentIndicator]
Meter=Shape
Shape=Rectangle 0,165,6,40 | StrokeWidth 0 | FillColor #FillColor#

[MeterTabWallpaperBg]
Meter=Shape
Shape=Rectangle 0,210,240,50 | StrokeWidth 0 | FillColor 0,0,0,1
MouseOverAction=[!SetOption MeterTabWallpaperBg Shape "Rectangle 0,210,240,50 | StrokeWidth 0 | FillColor #AccentHover#"][!UpdateMeter MeterTabWallpaperBg][!Redraw]
MouseLeaveAction=[!SetOption MeterTabWallpaperBg Shape "Rectangle 0,210,240,50 | StrokeWidth 0 | FillColor 0,0,0,1"][!UpdateMeter MeterTabWallpaperBg][!Redraw]
LeftMouseUpAction=[!ActivateConfig "EveryThing-UI\Settings" "Wallpaper.ini"]

[MeterTabWallpaperText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=150,150,150
X=45
Y=222
Text=WALLPAPER
AntiAlias=1

[MeterClose]
Meter=String
FontFace=#FontBody#
FontSize=18
FontColor=#TextColorDim#
X=(#Width#-30)
Y=30
StringAlign=Right
Text=X
AntiAlias=1
LeftMouseUpAction=[!DeactivateConfig]
MouseOverAction=[!SetOption MeterClose FontColor FFFFFF][!UpdateMeter MeterClose][!Redraw]
MouseLeaveAction=[!SetOption MeterClose FontColor #TextColorDim#][!UpdateMeter MeterClose][!Redraw]

; --- ACCENT TAB CONTENT ---
[MeterAccentHeading]
Meter=String
FontFace=#FontFace#
FontSize=32
FontColor=#TextColor#
X=290
Y=45
Text=ACCENT
AntiAlias=1

[MeterAccentSub]
Meter=String
FontFace=#FontBody#
FontSize=14
FontColor=#TextColorDim#
X=290
Y=95
Text=Personalize your system by choosing an accent color. This color will be applied globally across all your EveryThing-UI widgets.
W=450
ClipString=2
AntiAlias=1

; Red
[MeterColorRedRing]
Meter=Shape
Shape=Ellipse 310, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0
[MeterColorRed]
Meter=Shape
Shape=Ellipse 310, 220, 24 | FillColor EA1537 | StrokeWidth 0
LeftMouseUpAction=[!WriteKeyValue Variables FillColor "EA1537" "#@#Variables.inc"][!Refresh *]

; Blue
[MeterColorBlueRing]
Meter=Shape
Shape=Ellipse 390, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0
[MeterColorBlue]
Meter=Shape
Shape=Ellipse 390, 220, 24 | FillColor 007AFF | StrokeWidth 0
LeftMouseUpAction=[!WriteKeyValue Variables FillColor "007AFF" "#@#Variables.inc"][!Refresh *]

; Green
[MeterColorGreenRing]
Meter=Shape
Shape=Ellipse 470, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0
[MeterColorGreen]
Meter=Shape
Shape=Ellipse 470, 220, 24 | FillColor 34C759 | StrokeWidth 0
LeftMouseUpAction=[!WriteKeyValue Variables FillColor "34C759" "#@#Variables.inc"][!Refresh *]

; Orange
[MeterColorOrangeRing]
Meter=Shape
Shape=Ellipse 550, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0
[MeterColorOrange]
Meter=Shape
Shape=Ellipse 550, 220, 24 | FillColor FF9500 | StrokeWidth 0
LeftMouseUpAction=[!WriteKeyValue Variables FillColor "FF9500" "#@#Variables.inc"][!Refresh *]

; Purple
[MeterColorPurpleRing]
Meter=Shape
Shape=Ellipse 630, 220, 32 | FillColor 0,0,0,0 | StrokeWidth 0
[MeterColorPurple]
Meter=Shape
Shape=Ellipse 630, 220, 24 | FillColor AF52DE | StrokeWidth 0
LeftMouseUpAction=[!WriteKeyValue Variables FillColor "AF52DE" "#@#Variables.inc"][!Refresh *]
