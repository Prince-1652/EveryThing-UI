[Rainmeter]
Update=-1
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Settings - About
Author=Prince-1652
Information=About EveryThing-UI.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
Width=800
Height=450
CornerRadius=20
BgColor=1A1D1C
PanelColor=111312
TextColor=FFFFFF
TextColorDim=AAAAAA
FontFace=Ndot 57 Aligned
FontBody=Segoe UI
AccentHover=333333

; --- BACKGROUND & SIDEBAR ---
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height#,#CornerRadius# | StrokeWidth 0 | FillColor #BgColor#

[MeterSidebar]
Meter=Shape
Shape=Rectangle 0,0,240,#Height#,#CornerRadius# | StrokeWidth 0 | FillColor #PanelColor#
Shape2=Rectangle 220,0,20,#Height# | StrokeWidth 0 | FillColor #PanelColor#
Shape3=Combine Shape | Union Shape2

[MeterTitle]
Meter=String
FontFace=#FontFace#
FontSize=22
FontColor=#TextColor#
X=35
Y=35
Text=SETTINGS
AntiAlias=1

; --- TAB NAVIGATION ---
[MeterTabAboutBg]
Meter=Shape
Shape=Rectangle 0,110,240,50 | StrokeWidth 0 | FillColor 0,0,0,1

[MeterTabAboutText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=255,255,255
X=45
Y=122
Text=ABOUT
AntiAlias=1

[MeterTabAboutIndicator]
Meter=Shape
Shape=Rectangle 0,115,6,40 | StrokeWidth 0 | FillColor #FillColor#

[MeterTabAccentBg]
Meter=Shape
Shape=Rectangle 0,160,240,50 | StrokeWidth 0 | FillColor 0,0,0,1
MouseOverAction=[!SetOption MeterTabAccentBg Shape "Rectangle 0,160,240,50 | StrokeWidth 0 | FillColor #AccentHover#"][!UpdateMeter MeterTabAccentBg][!Redraw]
MouseLeaveAction=[!SetOption MeterTabAccentBg Shape "Rectangle 0,160,240,50 | StrokeWidth 0 | FillColor 0,0,0,1"][!UpdateMeter MeterTabAccentBg][!Redraw]
LeftMouseUpAction=[!ActivateConfig "EveryThing-UI\Settings" "Accent.ini"]

[MeterTabAccentText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=150,150,150
X=45
Y=172
Text=ACCENT
AntiAlias=1

[MeterTabWallpaperBg]
Meter=Shape
Shape=Rectangle 0,210,240,50 | StrokeWidth 0 | FillColor 0,0,0,1
MouseOverAction=[!SetOption MeterTabWallpaperBg Shape "Rectangle 0,210,240,50 | StrokeWidth 0 | FillColor #AccentHover#"][!UpdateMeter MeterTabWallpaperBg][!Redraw]
MouseLeaveAction=[!SetOption MeterTabWallpaperBg Shape "Rectangle 0,210,240,50 | StrokeWidth 0 | FillColor 0,0,0,1"][!UpdateMeter MeterTabWallpaperBg][!Redraw]
LeftMouseUpAction=[!ActivateConfig "EveryThing-UI\Settings" "Wallpaper.ini"]

[MeterTabWallpaperText]
Meter=String
FontFace=#FontFace#
FontSize=16
FontColor=150,150,150
X=45
Y=222
Text=WALLPAPER
AntiAlias=1

[MeterClose]
Meter=String
FontFace=#FontBody#
FontSize=18
FontColor=#TextColorDim#
X=(#Width#-30)
Y=30
StringAlign=Right
Text=X
AntiAlias=1
LeftMouseUpAction=[!DeactivateConfig]
MouseOverAction=[!SetOption MeterClose FontColor FFFFFF][!UpdateMeter MeterClose][!Redraw]
MouseLeaveAction=[!SetOption MeterClose FontColor #TextColorDim#][!UpdateMeter MeterClose][!Redraw]

; --- ABOUT TAB CONTENT ---
[MeterAboutHeading]
Meter=String
FontFace=#FontFace#
FontSize=32
FontColor=#TextColor#
X=290
Y=45
Text=WELCOME
AntiAlias=1

[MeterAboutBody1]
Meter=String
FontFace=#FontBody#
FontSize=14
FontColor=#TextColorDim#
X=290
Y=115
W=450
ClipString=2
Text=EveryThing-UI is a sleek, modern suite of widgets inspired by the Nothing OS aesthetic. It aims to provide functional beauty and minimalist design right on your desktop.
AntiAlias=1

[MeterAboutBody2]
Meter=String
FontFace=#FontBody#
FontSize=14
FontColor=#TextColor#
X=290
Y=20R
W=450
ClipString=2
Text=Thank you for downloading and enjoy your Nothing OS-like look for your device!
AntiAlias=1

[MeterVersion]
Meter=String
FontFace=#FontFace#
FontSize=12
FontColor=#TextColorDim#
X=290
Y=390
Text=v1.2
AntiAlias=1
