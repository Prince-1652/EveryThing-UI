[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Date Pill Light
Author=Prince-1652
Information=Nothing OS style date widget with ring progress (horizontal pill shape) - Light.
Version=1.0

[Variables]
@IncludeGlobal=#@#Variables.inc
WidgetColor=F0F0F0
WidgetWidth=190
WidgetHeight=95
CornerRadius=47.5
FontColor=000000
FontFace=Ndot 57 Aligned
DateFontSize=24
MonthFontSize=14
DayFontSize=11
RedColor=#FillColor#
BgColor=D0D0D0

[MeasureDate]
Measure=Time
Format=%d

[MeasureDayOfMonth]
Measure=Time
Format=%#d
MinValue=1
MaxValue=31

[MeasureMonth]
Measure=Time
Format=%B

[MeasureDayName]
Measure=Time
Format=%A

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,#CornerRadius# | StrokeWidth 0 | FillColor #WidgetColor#
AntiAlias=1

[MeterRingBg]
Meter=Roundline
X=47.5
Y=47.5
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
LineLength=35
LineStart=28
Solid=1
LineColor=#BgColor#
AntiAlias=1

[MeterRingFill]
Meter=Roundline
MeasureName=MeasureDayOfMonth
X=47.5
Y=47.5
StartAngle=(Rad(-90))
RotationAngle=(Rad(360))
LineLength=35
LineStart=28
Solid=1
LineColor=#FontColor#
AntiAlias=1

[MeterDateText]
Meter=String
MeasureName=MeasureDate
FontFace=#FontFace#
FontSize=#DateFontSize#
FontColor=#RedColor#
X=47.5
Y=52
StringAlign=CenterCenter
AntiAlias=1
Text=%1

[MeterMonthText]
Meter=String
MeasureName=MeasureMonth
FontFace=#FontFace#
FontSize=#MonthFontSize#
FontColor=#FontColor#
X=95
Y=45
StringAlign=LeftBottom
AntiAlias=1
StringCase=Upper
Text=%1

[MeterDayText]
Meter=String
MeasureName=MeasureDayName
FontFace=#FontFace#
FontSize=#DayFontSize#
FontColor=#RedColor#
X=95
Y=57
StringAlign=LeftTop
AntiAlias=1
StringCase=Upper
Text=%1
